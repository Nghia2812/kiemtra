<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login Form</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .login-box {
        background: rgba(255, 255, 255, 0.1);
        padding: 40px;
        border-radius: 15px;
        backdrop-filter: blur(10px);
        width: 320px;
        box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        color: white;
    }

    .login-box h2 {
        text-align: center;
        margin-bottom: 25px;
    }

    .input-box {
        position: relative;
        margin-bottom: 25px;
    }

    .input-box input {
        width: 100%;
        padding: 10px;
        background: transparent;
        border: none;
        border-bottom: 2px solid #fff;
        outline: none;
        color: white;
        font-size: 16px;
    }

    .input-box label {
        position: absolute;
        top: 50%;
        left: 0;
        transform: translateY(-50%);
        pointer-events: none;
        transition: 0.3s;
        color: #ddd;
    }

    .input-box input:focus ~ label,
    .input-box input:valid ~ label {
        top: -10px;
        font-size: 12px;
        color: #fff;
    }

    .login-btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 25px;
        background: #fff;
        color: #764ba2;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    .login-btn:hover {
        background: #ddd;
    }

    .extra {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
    }

    .extra a {
        color: #fff;
        text-decoration: none;
    }

    .extra a:hover {
        text-decoration: underline;
    }
</style>
</head>
<body>

<div class="login-box">
    <h2>Đăng nhập</h2>

    <form>
        <div class="input-box">
            <input type="text" required>
            <label>Tên đăng nhập</label>
        </div>

        <div class="input-box">
            <input type="password" required>
            <label>Mật khẩu</label>
        </div>

        <button class="login-btn">Login</button>

        <div class="extra">
            <p>Chưa có tài khoản? <a href="#">Đăng ký</a></p>
        </div>
    </form>
</div>

</body>
</html>
