<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Viết Thư B1</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --surface: #ffffff;
    --surface2: #f3f0ea;
    --border: #e0dbd0;
    --accent: #2d6a4f;
    --accent2: #52b788;
    --accent-light: #d8f3dc;
    --text: #1a1a18;
    --text2: #5a5a52;
    --text3: #9a9a90;
    --red: #c0392b;
    --red-bg: #fdf0ef;
    --amber: #b7641a;
    --amber-bg: #fef3e2;
    --gold: #8a6c00;
    --gold-bg: #fffbe6;
    --score-a: #1e6e3e;
    --score-b: #2d6a4f;
    --score-c: #b7641a;
    --score-d: #c0392b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .header {
    background: var(--accent);
    color: white;
    padding: 1.2rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }

  .header h1 {
    font-family: 'Lora', serif;
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  .header .subtitle {
    font-size: 0.78rem;
    opacity: 0.75;
    margin-top: 1px;
  }

  .header-badge {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 20px;
    padding: 3px 10px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-left: auto;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .prompt-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .prompt-header {
    background: var(--accent);
    color: white;
    padding: 0.9rem 1.3rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .prompt-header .left {
    display: flex;
    align-items: center;
    gap: 0.7rem;
  }

  .topic-badge {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 3px 12px;
    font-size: 0.75rem;
    font-weight: 500;
  }

  .prompt-title {
    font-size: 0.88rem;
    font-weight: 500;
  }

  .prompt-nav {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .nav-btn {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }

  .nav-btn:hover { background: rgba(255,255,255,0.25); }

  .prompt-counter {
    font-size: 0.8rem;
    opacity: 0.8;
    min-width: 50px;
    text-align: center;
  }

  .prompt-body {
    padding: 1.3rem;
  }

  .prompt-excerpt {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 0.9rem 1rem;
    margin-bottom: 1rem;
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    font-style: italic;
    color: var(--text2);
    line-height: 1.65;
  }

  .prompt-task {
    font-size: 0.92rem;
    color: var(--text);
    line-height: 1.6;
    font-weight: 500;
  }

  .prompt-bullets {
    margin-top: 0.6rem;
    padding-left: 1.2rem;
    font-size: 0.88rem;
    color: var(--text2);
    line-height: 1.8;
  }

  .prompt-bullets li { margin-bottom: 2px; }

  .sample-btn-wrap {
    text-align: right;
    margin-top: 0.9rem;
  }

  .sample-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 14px;
    font-size: 0.8rem;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .sample-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .sample-box {
    display: none;
    margin-top: 0.9rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    font-size: 0.83rem;
    line-height: 1.75;
    color: var(--text2);
    white-space: pre-wrap;
    font-family: 'Lora', serif;
    max-height: 260px;
    overflow-y: auto;
  }

  .sample-box.show { display: block; }

  .writing-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
  }

  .writing-header {
    padding: 0.9rem 1.3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .writing-title {
    font-size: 0.88rem;
    font-weight: 500;
    color: var(--text);
  }

  .word-count {
    font-size: 0.78rem;
    color: var(--text3);
    background: var(--surface2);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .word-count.ok { color: var(--score-a); background: var(--accent-light); }
  .word-count.warn { color: var(--amber); background: var(--amber-bg); }

  textarea {
    width: 100%;
    min-height: 280px;
    padding: 1.2rem 1.3rem;
    border: none;
    outline: none;
    resize: vertical;
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--text);
    background: var(--surface);
    display: block;
  }

  .writing-footer {
    padding: 0.9rem 1.3rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }

  .hint-text {
    font-size: 0.78rem;
    color: var(--text3);
  }

  .score-btn {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 0.55rem 1.4rem;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .score-btn:hover { background: #235a40; }
  .score-btn:disabled { background: var(--text3); cursor: not-allowed; }

  .loading-spinner {
    display: none;
    margin: 2rem auto;
    text-align: center;
    color: var(--text2);
    font-size: 0.88rem;
  }

  .spinner-dots {
    display: inline-flex;
    gap: 6px;
    margin-bottom: 0.5rem;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 0.9s infinite ease-in-out;
  }

  .dot:nth-child(2) { animation-delay: 0.15s; }
  .dot:nth-child(3) { animation-delay: 0.3s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-8px); opacity: 1; }
  }

  .result-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    margin-bottom: 1.5rem;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 1.1rem 1.3rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .score-circle {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border: 3px solid;
  }

  .score-circle .grade {
    font-size: 1.5rem;
    font-weight: 600;
    font-family: 'Lora', serif;
    line-height: 1;
  }

  .score-circle .pts {
    font-size: 0.65rem;
    opacity: 0.75;
    margin-top: 2px;
  }

  .grade-A { border-color: var(--score-a); color: var(--score-a); background: var(--accent-light); }
  .grade-B { border-color: var(--score-b); color: var(--score-b); background: #e8f4ec; }
  .grade-C { border-color: var(--amber); color: var(--amber); background: var(--amber-bg); }
  .grade-D { border-color: var(--red); color: var(--red); background: var(--red-bg); }

  .result-summary h3 {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
  }

  .result-summary p {
    font-size: 0.83rem;
    color: var(--text2);
    line-height: 1.55;
  }

  .criteria-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1px;
    background: var(--border);
    border-top: 1px solid var(--border);
  }

  .criterion {
    background: var(--surface);
    padding: 1rem 1.2rem;
  }

  .criterion-name {
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .criterion-score-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin-bottom: 0.35rem;
  }

  .criterion-pts {
    font-size: 1.1rem;
    font-weight: 600;
    font-family: 'Lora', serif;
  }

  .mini-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .mini-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .bar-good { background: var(--accent2); }
  .bar-ok { background: #f0a500; }
  .bar-low { background: var(--red); }

  .criterion-note {
    font-size: 0.78rem;
    color: var(--text2);
    line-height: 1.5;
  }

  .feedback-section {
    padding: 1.2rem 1.3rem;
    border-top: 1px solid var(--border);
  }

  .feedback-section h4 {
    font-size: 0.83rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .feedback-text {
    font-size: 0.87rem;
    line-height: 1.7;
    color: var(--text);
  }

  .feedback-text ul {
    padding-left: 1.2rem;
    margin-top: 0.5rem;
  }

  .feedback-text li { margin-bottom: 4px; }

  .tag-good {
    display: inline-block;
    background: var(--accent-light);
    color: var(--score-a);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-right: 3px;
  }

  .tag-improve {
    display: inline-block;
    background: var(--amber-bg);
    color: var(--amber);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-right: 3px;
  }

  .tag-error {
    display: inline-block;
    background: var(--red-bg);
    color: var(--red);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 0.72rem;
    font-weight: 500;
    margin-right: 3px;
  }

  .actions-row {
    padding: 1rem 1.3rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 0.7rem;
  }

  .action-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.45rem 1rem;
    font-size: 0.83rem;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }

  .action-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .action-btn.primary {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  .action-btn.primary:hover { background: #235a40; }

  .error-box {
    display: none;
    background: var(--red-bg);
    border: 1px solid #f5b7b1;
    border-radius: 10px;
    padding: 0.9rem 1.1rem;
    margin-bottom: 1rem;
    font-size: 0.85rem;
    color: var(--red);
  }

  @media (max-width: 600px) {
    .criteria-grid { grid-template-columns: 1fr; }
    .writing-footer { flex-direction: column; align-items: stretch; }
    .score-btn { justify-content: center; }
    .header h1 { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>✉️ Luyện Viết Thư B1</h1>
    <div class="subtitle">Luyện tập & chấm điểm bằng AI</div>
  </div>
  <div class="header-badge" id="topicCounter">29 đề</div>
</div>

<div class="container">

  <div class="prompt-panel">
    <div class="prompt-header">
      <div class="left">
        <span class="topic-badge" id="topicBadge">Đề 1</span>
        <span class="prompt-title">Đề thi viết thư</span>
      </div>
      <div class="prompt-nav">
        <button class="nav-btn" onclick="changePrompt(-1)">◀</button>
        <span class="prompt-counter" id="promptCounter">1 / 29</span>
        <button class="nav-btn" onclick="changePrompt(1)">▶</button>
        <button class="nav-btn" onclick="randomPrompt()" title="Ngẫu nhiên">🔀</button>
      </div>
    </div>
    <div class="prompt-body">
      <div class="prompt-excerpt" id="promptExcerpt"></div>
      <div class="prompt-task" id="promptTask"></div>
      <ul class="prompt-bullets" id="promptBullets"></ul>
      <div class="sample-btn-wrap">
        <button class="sample-btn" onclick="toggleSample()">📄 Xem bài mẫu</button>
      </div>
      <div class="sample-box" id="sampleBox"></div>
    </div>
  </div>

  <div class="writing-section">
    <div class="writing-header">
      <span class="writing-title">✍️ Bài viết của bạn</span>
      <span class="word-count" id="wordCount">0 từ</span>
    </div>
    <textarea id="userText" placeholder="Bắt đầu viết thư của bạn ở đây...&#10;&#10;Dear ...," spellcheck="false"></textarea>
    <div class="writing-footer">
      <span class="hint-text">Tối thiểu 120 từ • Cần chào hỏi, thân bài, kết thư</span>
      <button class="score-btn" id="scoreBtn" onclick="scoreEssay()">
        <span>🤖</span> Chấm điểm AI
      </button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="loading-spinner" id="loadingSpinner">
    <div class="spinner-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div>Đang chấm bài... vui lòng đợi</div>
  </div>

  <div class="result-panel" id="resultPanel">
    <div class="result-header">
      <div class="score-circle" id="scoreCircle">
        <span class="grade" id="scoreGrade">-</span>
        <span class="pts" id="scorePts">-</span>
      </div>
      <div class="result-summary">
        <h3 id="resultHeadline">Kết quả chấm bài</h3>
        <p id="resultSummaryText"></p>
      </div>
    </div>
    <div class="criteria-grid" id="criteriaGrid"></div>
    <div class="feedback-section">
      <h4>💬 Nhận xét chi tiết</h4>
      <div class="feedback-text" id="detailedFeedback"></div>
    </div>
    <div class="actions-row">
      <button class="action-btn primary" onclick="resetAll()">📝 Viết lại</button>
      <button class="action-btn" onclick="changePrompt(1)">➡️ Đề tiếp theo</button>
      <button class="action-btn" onclick="randomPrompt()">🔀 Đề ngẫu nhiên</button>
    </div>
  </div>

</div>

<script>
const PROMPTS = [
  {
    id: 1,
    excerpt: "\"I'm really excited to see you next month. I've just booked my flight.....\"",
    task: "Bạn nhận được thư từ người bạn Anh tên Mary. Viết thư hồi đáp Mary.",
    bullets: ["Hướng dẫn cách đến nhà từ sân bay", "Giới thiệu những địa điểm tham quan", "Gợi ý bảo tàng hoặc gallery thú vị"],
    sample: `Dear Mary,

I hope this letter finds you well. It was great to hear from you, and I'm delighted to help you with your upcoming visit. To reach my house from the airport, the most convenient option is to take a taxi or use the airport shuttle service. The journey should take approximately 30 minutes, depending on traffic.

During your stay, I highly recommend visiting Ho Chi Minh Square, known for its stunning architecture and historical significance. Additionally, don't miss exploring Goong Lake, where you can enjoy leisurely walks in tranquil surroundings.

For art enthusiasts, the Xo Viet Nghe Tinh Museum showcases both local and international artists. The Military Region 4 Museum also features captivating exhibits on our region's history.

I hope these suggestions enhance your visit. If you have any questions, please don't hesitate to let me know.

Best regards,
Na`
  },
  {
    id: 2,
    excerpt: "\"Thanks for inviting me to come and stay with you. I'm going to take you up on it...\"",
    task: "Bạn nhận được thư từ người bạn Anh tên Paula. Viết thư hồi đáp Paula.",
    bullets: ["Thời điểm tốt nhất để đến thăm và giải thích lý do", "Những hoạt động có thể làm trong chuyến thăm", "Gợi ý quà mang theo (nếu muốn)"],
    sample: `Dear Paula,

I hope this letter finds you well. I was delighted to receive your letter, and it would be wonderful to have you come and stay with me!

The best time to visit would be during the summer months, particularly in July or August. The weather is warm and pleasant with plenty of sunshine, ideal for outdoor activities.

During your stay, we can explore the beautiful parks and gardens, go hiking in the nearby mountains, and even take a boat trip along the river. There are also cultural festivals happening in summer, which would be a fantastic opportunity to experience local traditions.

As for a present, there is no need to bring anything lavish — your presence is the best gift! However, if you insist, something representative of your hometown would be greatly appreciated.

Take care and see you soon!

Best regards,
Hoa`
  },
  {
    id: 3,
    excerpt: "\"I'm very happy to see your name on the friend's forever website. Do you remember me?\"",
    task: "Bạn nhận email từ người bạn Anh tên Anna. Viết email hồi đáp Anna.",
    bullets: ["Ôn lại những kỷ niệm chung", "Kể về cuộc sống hiện tại của bạn", "Mời Anna đến thăm/gặp mặt"],
    sample: `Dear Anna,

I hope this letter finds you well. It's been a long time since we last met 2 years ago. I'm so thrilled to get your letter!

Actually, I have recently moved to Vinh city to work. Luckily, I have been appointed as a manager at ABC Financial Company after an intense interview.

I really miss you and the time I spent at your house. My family has heard so much about you and they are looking forward to seeing you. If you have time to spare, why don't you enjoy a cozy dinner with my family next Sunday, June 20th?

My house is at 16 Nguyen Nghiem, Xuan An town, Ha Tinh province, only 20 minutes from your hotel.

Love,
Hoa`
  },
  {
    id: 4,
    excerpt: "\"How are things getting on with you? We haven't met for a long time. Are you still living with your parents? I remember you were thinking about buying a house in the countryside.\"",
    task: "Viết thư hồi đáp Marry.",
    bullets: ["Cập nhật cuộc sống hiện tại", "Kể về nơi ở hiện tại", "Chia sẻ về kế hoạch mua nhà ở nông thôn"],
    sample: `Dear Marry,

I hope this letter finds you well. It has been quite a while since we last caught up, and I wanted to share some updates about my life.

Lately, I've been keeping busy with work and personal development. I have taken on new projects that have challenged and inspired me.

As for my current residence, I have moved to a lovely suburban area. It's a peaceful neighbourhood with green landscapes and a close-knit community.

Speaking of buying a house in the countryside, it has been on my mind lately. I really like the idea of enjoying a peaceful rural life, and I have been exploring options.

I would love to hear about your own experiences too. Please do share any updates!

Best regards,
Hoa`
  },
  {
    id: 5,
    excerpt: "\"How time flies! I was very busy on my last day on campus before the summer vacation. I am sorry that I didn't have time to say goodbye to you...\"",
    task: "Bạn cùng phòng Anna gửi thư. Viết thư hồi đáp Anna.",
    bullets: ["Kể về nơi ở hiện tại", "Kế hoạch cho kỳ nghỉ sắp tới", "Mời Anna đến thăm quê hương"],
    sample: `Dear Anna,

I hope this letter finds you well. It was great to hear from you! Allow me to update you on my current situation.

I am now residing in a cozy apartment in the city centre. The location is fantastic with easy access to restaurants, markets, and public transport.

For my upcoming holiday, I'm planning to return to my hometown to spend quality time with my family. We have planned various activities such as visiting local attractions and enjoying delicious home-cooked meals.

Speaking of my hometown, I'd like to invite you to visit. I can show you around and share the beauty of the area with you. I'm sure you'll love the scenic landscapes!

Best regards,
Hoa`
  },
  {
    id: 6,

let currentIndex = 0;
let sampleVisible = false;

function renderPrompt() {
  const p = PROMPTS[currentIndex];
  document.getElementById('topicBadge').textContent = `Đề ${p.id}`;
  document.getElementById('promptCounter').textContent = `${currentIndex + 1} / ${PROMPTS.length}`;
  document.getElementById('promptExcerpt').textContent = p.excerpt;
  document.getElementById('promptTask').textContent = p.task;

  const bulletsEl = document.getElementById('promptBullets');
  bulletsEl.innerHTML = '';
  if (p.bullets && p.bullets.length) {
    p.bullets.forEach(b => {
      const li = document.createElement('li');
      li.textContent = b;
      bulletsEl.appendChild(li);
    });
  }

  document.getElementById('sampleBox').classList.remove('show');
  document.getElementById('sampleBox').textContent = p.sample || '';
  sampleVisible = false;
}

function changePrompt(dir) {
  currentIndex = (currentIndex + dir + PROMPTS.length) % PROMPTS.length;
  renderPrompt();
  hideResult();
}

function randomPrompt() {
  const r = Math.floor(Math.random() * PROMPTS.length);
  currentIndex = r;
  renderPrompt();
  hideResult();
}

function toggleSample() {
  sampleVisible = !sampleVisible;
  document.getElementById('sampleBox').classList.toggle('show', sampleVisible);
}

function hideResult() {
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';
}

function resetAll() {
  document.getElementById('userText').value = '';
  document.getElementById('wordCount').textContent = '0 từ';
  document.getElementById('wordCount').className = 'word-count';
  hideResult();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('userText').addEventListener('input', function() {
  const text = this.value.trim();
  const words = text ? text.split(/\s+/).length : 0;
  const wc = document.getElementById('wordCount');
  wc.textContent = `${words} từ`;
  wc.className = 'word-count' + (words >= 120 ? ' ok' : words >= 80 ? ' warn' : '');
});

async function scoreEssay() {
  const text = document.getElementById('userText').value.trim();
  if (!text || text.length < 50) {
    showError('Vui lòng viết ít nhất 50 ký tự trước khi chấm điểm.');
    return;
  }

  const p = PROMPTS[currentIndex];
  document.getElementById('scoreBtn').disabled = true;
  document.getElementById('loadingSpinner').style.display = 'block';
  document.getElementById('resultPanel').style.display = 'none';
  document.getElementById('errorBox').style.display = 'none';

  const prompt = `You are an expert B1 English letter writing examiner. Evaluate the following student letter written in response to a B1 exam prompt.

EXAM PROMPT:
Task: ${p.task}
Context clue: ${p.excerpt}
Required points: ${p.bullets.join('; ')}

STUDENT'S LETTER:
${text}

Score this letter using B1 CEFR criteria. Return ONLY a JSON object (no markdown, no extra text) with this exact structure:
{
  "totalScore": <number 0-100>,
  "grade": "<A/B/C/D>",
  "headline": "<short Vietnamese encouraging headline>",
  "summary": "<2-3 sentence Vietnamese overall assessment>",
  "criteria": [
    {"name": "Task Achievement", "nameVi": "Hoàn thành nhiệm vụ", "score": <0-25>, "max": 25, "feedback": "<Vietnamese feedback>"},
    {"name": "Coherence & Cohesion", "nameVi": "Mạch lạc & Liên kết", "score": <0-25>, "max": 25, "feedback": "<Vietnamese feedback>"},
    {"name": "Vocabulary", "nameVi": "Từ vựng", "score": <0-25>, "max": 25, "feedback": "<Vietnamese feedback>"},
    {"name": "Grammar & Accuracy", "nameVi": "Ngữ pháp", "score": <0-25>, "max": 25, "feedback": "<Vietnamese feedback>"}
  ],
  "strengths": ["<Vietnamese strength 1>", "<Vietnamese strength 2>"],
  "improvements": ["<Vietnamese improvement 1>", "<Vietnamese improvement 2>"],
  "errors": ["<specific error example from text>"],
  "tip": "<one specific actionable Vietnamese tip>"
}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const raw = data.content.map(i => i.text || '').join('');
    const clean = raw.replace(/```json|```/g, '').trim();
    const result = JSON.parse(clean);
    displayResult(result);
  } catch (err) {
    showError('Không thể kết nối AI chấm điểm. Vui lòng thử lại sau.');
    console.error(err);
  } finally {
    document.getElementById('scoreBtn').disabled = false;
    document.getElementById('loadingSpinner').style.display = 'none';
  }
}

function showError(msg) {
  const e = document.getElementById('errorBox');
  e.textContent = '⚠️ ' + msg;
  e.style.display = 'block';
}

function displayResult(r) {
  const gradeClass = { A: 'grade-A', B: 'grade-B', C: 'grade-C', D: 'grade-D' };
  const circle = document.getElementById('scoreCircle');
  circle.className = 'score-circle ' + (gradeClass[r.grade] || 'grade-C');
  document.getElementById('scoreGrade').textContent = r.grade;
  document.getElementById('scorePts').textContent = r.totalScore + '/100';
  document.getElementById('resultHeadline').textContent = r.headline || 'Kết quả chấm bài';
  document.getElementById('resultSummaryText').textContent = r.summary || '';

  const grid = document.getElementById('criteriaGrid');
  grid.innerHTML = '';
  (r.criteria || []).forEach(c => {
    const pct = Math.round((c.score / c.max) * 100);
    const barClass = pct >= 70 ? 'bar-good' : pct >= 45 ? 'bar-ok' : 'bar-low';
    const color = pct >= 70 ? '#1e6e3e' : pct >= 45 ? '#b7641a' : '#c0392b';
    const div = document.createElement('div');
    div.className = 'criterion';
    div.innerHTML = `
      <div class="criterion-name">${c.nameVi || c.name}</div>
      <div class="criterion-score-row">
        <span class="criterion-pts" style="color:${color}">${c.score}/${c.max}</span>
        <div class="mini-bar"><div class="mini-bar-fill ${barClass}" style="width:${pct}%"></div></div>
      </div>
      <div class="criterion-note">${c.feedback || ''}</div>
    `;
    grid.appendChild(div);
  });

  let html = '';
  if (r.strengths && r.strengths.length) {
    html += `<p style="margin-bottom:0.5rem"><span class="tag-good">✓ Điểm mạnh</span></p><ul>`;
    r.strengths.forEach(s => { html += `<li>${s}</li>`; });
    html += `</ul>`;
  }
  if (r.improvements && r.improvements.length) {
    html += `<p style="margin-top:0.9rem;margin-bottom:0.5rem"><span class="tag-improve">↑ Cần cải thiện</span></p><ul>`;
    r.improvements.forEach(s => { html += `<li>${s}</li>`; });
    html += `</ul>`;
  }
  if (r.errors && r.errors.length) {
    html += `<p style="margin-top:0.9rem;margin-bottom:0.5rem"><span class="tag-error">✗ Lỗi cụ thể</span></p><ul>`;
    r.errors.forEach(s => { html += `<li>${s}</li>`; });
    html += `</ul>`;
  }
  if (r.tip) {
    html += `<p style="margin-top:0.9rem;padding:0.7rem 0.9rem;background:var(--accent-light);border-radius:8px;font-size:0.85rem;color:var(--score-a)">💡 <strong>Mẹo:</strong> ${r.tip}</p>`;
  }

  document.getElementById('detailedFeedback').innerHTML = html;

  const panel = document.getElementById('resultPanel');
  panel.style.display = 'block';
  setTimeout(() => { panel.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);
}

renderPrompt();
</script>

</body>
</html>
