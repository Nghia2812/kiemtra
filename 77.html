<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luyện Đọc B1 — VSTEP</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4ff;color:#1e293b;min-height:100vh}

/* HEADER */
.header{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:18px 24px;text-align:center;box-shadow:0 2px 12px rgba(99,102,241,.3)}
.header h1{font-size:1.5rem;color:#fff;font-weight:700;letter-spacing:.5px}
.header p{color:rgba(255,255,255,.8);font-size:.85rem;margin-top:3px}

.container{max-width:940px;margin:0 auto;padding:20px 16px}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.stat-card .num{font-size:1.7rem;font-weight:700;color:#6366f1}
.stat-card .lbl{font-size:.72rem;color:#64748b;margin-top:2px;font-weight:500}

/* TOOLBAR */
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-bar{flex:1;min-width:180px;padding:10px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:#fff;color:#1e293b;font-size:.9rem;outline:none;transition:.2s}
.search-bar:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.12)}
.btn-random{padding:10px 18px;border-radius:10px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:transform .15s,box-shadow .15s}
.btn-random:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(239,68,68,.35)}
.btn-random:active{transform:scale(.97)}

/* EXAM GRID */
.exam-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.exam-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:16px;cursor:pointer;transition:all .18s}
.exam-card:hover{border-color:#6366f1;box-shadow:0 4px 16px rgba(99,102,241,.18);transform:translateY(-2px)}
.exam-card.done{border-color:#10b981;background:#f0fdf4}
.exam-card .exam-num{font-size:.68rem;color:#6366f1;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.exam-card .exam-title{font-size:.88rem;color:#1e293b;margin-top:4px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.exam-card .exam-meta{display:flex;gap:8px;margin-top:10px;align-items:center}
.badge{font-size:.68rem;padding:3px 9px;border-radius:20px;background:#ede9fe;color:#6366f1;font-weight:600}
.badge.done{background:#d1fae5;color:#059669}
.score-badge{font-size:.7rem;padding:3px 9px;border-radius:20px;margin-left:auto;font-weight:700}
.score-badge.high{background:#d1fae5;color:#059669}
.score-badge.mid{background:#fef9c3;color:#d97706}
.score-badge.low{background:#fee2e2;color:#dc2626}

/* QUIZ SCREEN */
.quiz-screen{display:none}
.quiz-top{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.back-btn{padding:8px 16px;border-radius:9px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;font-size:.83rem;font-weight:600;transition:.15s}
.back-btn:hover{border-color:#6366f1;color:#6366f1}
.quiz-title{font-size:1rem;color:#1e293b;font-weight:700;flex:1}

.progress-wrap{width:100%;background:#e2e8f0;border-radius:20px;height:8px;margin-bottom:6px}
.progress-bar{height:8px;border-radius:20px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .35s}
.q-counter{font-size:.78rem;color:#64748b;margin-bottom:14px;font-weight:500}

.passage-box{background:#fff;border:1.5px solid #e2e8f0;border-radius:14px;padding:18px;margin-bottom:16px;max-height:260px;overflow-y:auto;font-size:.87rem;line-height:1.85;color:#334155}
.passage-box::-webkit-scrollbar{width:5px}
.passage-box::-webkit-scrollbar-track{background:#f1f5f9}
.passage-box::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:4px}
.passage-toggle{font-size:.78rem;color:#6366f1;cursor:pointer;margin-bottom:8px;display:inline-flex;align-items:center;gap:4px;font-weight:600;padding:4px 10px;background:#ede9fe;border-radius:8px;transition:.15s}
.passage-toggle:hover{background:#ddd6fe}

.question-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.q-text{font-size:.95rem;color:#1e293b;font-weight:600;margin-bottom:16px;line-height:1.65}
.options{display:flex;flex-direction:column;gap:9px}

.opt-btn{padding:12px 16px;border-radius:11px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#334155;text-align:left;cursor:pointer;font-size:.88rem;line-height:1.5;transition:all .15s;display:flex;gap:10px;align-items:flex-start}
.opt-btn:hover:not(:disabled){border-color:#6366f1;background:#ede9fe;color:#3730a3}
.opt-btn .opt-label{font-weight:700;min-width:22px;color:#6366f1;flex-shrink:0}

.opt-btn.correct{border-color:#10b981;background:#d1fae5;color:#065f46;font-weight:600}
.opt-btn.correct .opt-label{color:#059669}
.opt-btn.wrong{border-color:#ef4444;background:#fee2e2;color:#7f1d1d;font-weight:600}
.opt-btn.wrong .opt-label{color:#dc2626}
.opt-btn.reveal{border-color:#10b981;background:#d1fae5;color:#065f46}
.opt-btn.reveal .opt-label{color:#059669}
.opt-btn:disabled{cursor:default}

.result-row{display:flex;align-items:center;gap:10px;margin-top:14px;padding:10px 14px;border-radius:10px;font-size:.87rem;font-weight:600}
.result-row.ok{background:#d1fae5;color:#065f46}
.result-row.err{background:#fee2e2;color:#7f1d1d}
.result-icon{font-size:1.1rem}

.nav-btns{display:flex;gap:10px;margin-top:18px;justify-content:space-between;flex-wrap:wrap}
.btn-primary{padding:12px 28px;border-radius:11px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;cursor:pointer;font-size:.92rem;font-weight:700;transition:all .15s;box-shadow:0 2px 8px rgba(99,102,241,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(99,102,241,.4)}
.btn-secondary{padding:12px 22px;border-radius:11px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;font-size:.88rem;font-weight:600;transition:.15s}
.btn-secondary:hover{border-color:#6366f1;color:#6366f1}

/* RESULT SCREEN */
.result-screen{display:none;text-align:center;padding:40px 20px}
.result-circle{width:150px;height:150px;border-radius:50%;margin:0 auto 24px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:5px solid #6366f1;background:#fff;box-shadow:0 4px 20px rgba(99,102,241,.2)}
.result-circle .big-num{font-size:2.6rem;font-weight:800;color:#6366f1}
.result-circle .small-txt{font-size:.72rem;color:#64748b;font-weight:500}
.result-msg{font-size:1.3rem;font-weight:700;margin-bottom:6px;color:#1e293b}
.result-sub{font-size:.88rem;color:#64748b;margin-bottom:28px}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* RANDOM SPINNER OVERLAY */
.spinner-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,42,.6);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(2px)}
.spinner-overlay.show{display:flex}
.spinner-box{background:#fff;border-radius:20px;padding:36px 40px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.2)}
.spin-num{font-size:3.5rem;font-weight:800;color:#6366f1;min-width:80px;display:inline-block;transition:color .1s}
.spin-label{font-size:.9rem;color:#64748b;margin-top:8px;font-weight:500}
.spin-title{font-size:.85rem;color:#334155;margin-top:6px;max-width:240px;font-style:italic}

@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .exam-grid{grid-template-columns:1fr}
  .header h1{font-size:1.2rem}
  .btn-primary{padding:11px 20px}
}
</style>
</head>
<body>

<div class="header">
  <h1>📖 Luyện Kỹ Năng Đọc B1</h1>
  <p>VSTEP Reading Practice — Chọn đề hoặc quay ngẫu nhiên để bắt đầu</p>
</div>

<div class="container">

<!-- HOME -->
<div id="homeScreen">
  <div class="stats-bar">
    <div class="stat-card"><div class="num" id="totalExams">0</div><div class="lbl">Đề thi</div></div>
    <div class="stat-card"><div class="num" id="totalQs">0</div><div class="lbl">Câu hỏi</div></div>
    <div class="stat-card"><div class="num" id="doneExams">0</div><div class="lbl">Đã làm</div></div>
    <div class="stat-card"><div class="num" id="avgScore">—</div><div class="lbl">Điểm TB</div></div>
  </div>
  <div class="toolbar">
    <input class="search-bar" type="text" placeholder="🔍  Tìm đề thi theo tên hoặc số..." id="searchInput" oninput="filterExams()">
    <button class="btn-random" onclick="startRandom()">🎲 Quay ngẫu nhiên</button>
  </div>
  <div class="exam-grid" id="examGrid"></div>
</div>

<!-- QUIZ -->
<div class="quiz-screen" id="quizScreen">
  <div class="quiz-top">
    <button class="back-btn" onclick="goHome()">← Trang chủ</button>
    <div class="quiz-title" id="quizTitleBar"></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
  <div class="q-counter" id="qCounter"></div>
  <div id="passageArea"></div>
  <div id="questionArea"></div>
  <div class="nav-btns">
    <button class="btn-secondary" id="prevBtn" onclick="prevQ()">← Câu trước</button>
    <button class="btn-primary" id="nextBtn" onclick="nextQ()">Câu tiếp →</button>
  </div>
</div>

<!-- RESULT -->
<div class="result-screen" id="resultScreen">
  <div class="result-circle">
    <div class="big-num" id="resScore">0</div>
    <div class="small-txt" id="resTotal"></div>
  </div>
  <div class="result-msg" id="resMsg"></div>
  <div class="result-sub" id="resSub"></div>
  <div class="result-actions">
    <button class="btn-secondary" onclick="goHome()">← Trang chủ</button>
    <button class="btn-primary" onclick="retryExam()">🔄 Làm lại</button>
    <button class="btn-secondary" onclick="reviewExam()">📋 Xem đáp án</button>
  </div>
</div>

</div>

<!-- RANDOM SPINNER -->
<div class="spinner-overlay" id="spinnerOverlay">
  <div class="spinner-box">
    <div style="font-size:.85rem;color:#64748b;margin-bottom:12px;font-weight:600">🎲 QUAY NGẪU NHIÊN</div>
    <div class="spin-num" id="spinNum">—</div>
    <div class="spin-label">Đề đang chọn...</div>
    <div class="spin-title" id="spinTitle"></div>
  </div>
</div>

<script>
const EXAMS = [
{
  id:1, title:"Brendan's best friend is Tip",
  passage:`Brendan's best friend is Tip. Tip and Brendan are inseparable. They teach each other things and they look after each other. Tip has helped Brendan become more responsible, more caring, and a better friend. Brendan is a nine-year-old boy, and Tip is a ten-year-old dog.\n\nHaving a dog helps a child learn how to act responsibly. As a dog owner, the child must take care of the animal's daily needs. The dog must be fed and exercised every day. A dog is completely dependent on its owner for all its needs. Therefore, being responsible for a dog also means taking care of the dog so that it stays healthy.\n\nAnother lesson that a child can learn from having a dog is how to be empathetic. A dog cannot express itself with speech, so its owner must learn how to interpret its behaviour. The child must learn to understand what the dog's behaviour means. Understanding a situation from the dog's perspective helps the child understand why the dog is behaving in a certain way.\n\nOne of the most significant benefits of owning a dog is the example of true friendship that a dog provides. A dog gives unconditional love to its owner. A dog will not stop loving its owner because of a little anger, indifference, or neglect.`,
  questions:[
    {q:"The word 'its' in paragraph 2 refer to:",opts:["A horse","A rabbit","A pig","A dog"],ans:3},
    {q:"What does the author say about empathy?",opts:["It eventually makes children more competitive","It eventually makes children more considerate and caring","It leads children to become more independent","It encourages children to be more reserved"],ans:1},
    {q:"All of the following is true of learning to take care of a dog EXCEPT:",opts:["It teaches children about independence","It is a simple task for children","It is a minor role in children's development","It is an important responsibility in children's life"],ans:3},
    {q:"What does the author say about the dog's behaviour?",opts:["They express the dog's mind","They show the dog's training","They indicate the dog's breed","They reflect the dog's health"],ans:0},
    {q:"In which paragraph does the author mention dogs owners responsibilities to their dog?",opts:["Paragraph 3","Paragraph 2","Paragraph 4","Paragraph 1"],ans:1},
    {q:"What can we say about Tip and Brendan?",opts:["Tip is five years old","Tip is a newborn","Tip is three years old","Tip is older than Brendan"],ans:3},
    {q:"What is main idea of paragraph 3?",opts:["How dogs enhance children's intelligence","How dogs teach children about discipline","How dogs improve children's physical health","How dogs teach children about empathy"],ans:3},
    {q:"What is best title for the passage?",opts:["Responsibilities of dog ownership for children","Positive effects on children of owning a dog","Challenges of owning a dog for children","Negative effects on children of owning a dog"],ans:1},
  ]
},
{
  id:2, title:"There's one thing we can all agree on getting on",
  passage:`New Zealand's South Island is the best place for road trips. You can see sea creatures along the Kaikoura Coast, explore the Abel Tasman National Park for beaches, visit Waipara Valley famous for its vineyards and local wines, and enjoy winter sports in the mountains.`,
  questions:[
    {q:"You may have chance to see sea creatures in:",opts:["Kaikoura coast","Waipara valley","Christchurch city","Wellington harbour"],ans:0},
    {q:"Which place would probably give you the best time at the beach?",opts:["Kaikoura Coast","Abel Tasman","Waipara Valley","Christchurch"],ans:1},
    {q:"Rebound =",opts:["recovery","prevention","recession","honeymoon"],ans:0},
    {q:"Majestic =",opts:["harmonious","dilapidated","uncommon","magnificent"],ans:3},
    {q:"In which paragraph does the author mention the place where people can play winter sports?",opts:["para 1","para 3","para 4","para 5"],ans:1},
    {q:"What activities can tourists do at Pegasus bay winery?",opts:["See sea creatures","Enjoy beaches","They can taste wine","Road trips"],ans:2},
    {q:"All of the following is true, EXCEPT:",opts:["It is the best place for road trips","Waipara valley produces one of the best bottles in the world","Waipara valley is famous for its vineyards","Waipara valley is renowned for its local wines"],ans:1},
    {q:"What does the author say about New Zealand's south island?",opts:["It is the center of economy","It is known for urban life","It is the most populated area","It is the best place for road trips"],ans:3},
    {q:"Main Idea:",opts:["Best place in New Zealand's South Island","Most affordable destination in New Zealand","Busiest tourist spot in New Zealand","Quietest region in New Zealand's South Island"],ans:0},
  ]
},
{
  id:3, title:"Flood is a term used to...",
  passage:`Flood is a term used to denote an enormous amount of water. When there is an outflow of water in a place, it is said to be flooded. Floods lead to an overfull and huge spread of water and bring diseases such as typhoid, cholera. Flood may be caused by massive rainfall, overflowing rivers, collapsed dams, snowmelt, deforestation, climate change, and emission of greenhouse gases. A flood can be caused both due to natural causes as well as it can be a human-made flood. Flood causes a huge loss of life and property. Waterborne diseases spread as a result of floods causing health problems.`,
  questions:[
    {q:"How does melting snow cause flooding?",opts:["It decreases the flow of river","It makes the level of the river rise","It lowers the temperature of the river","It changes the course of the river"],ans:1},
    {q:"'they' para 1 = ?",opts:["Volcanoes","Tornadoes","Glaciers","Floods"],ans:3},
    {q:"Which statement is true?",opts:["Flooding can be caused by both nature and human activity","Flooding is entirely prevented by modern technology","Flooding is solely a natural phenomenon","Flooding is only caused by human activities"],ans:0},
    {q:"'widespread' para 1 = ?",opts:["Exact","Overall","Relative","Partial"],ans:1},
    {q:"According to the passage, flows of unleashed dam waters can:",opts:["Destroy everything on their ways","Create new habitats for wildlife","Enhance the surrounding environment","Improve water quality downstream"],ans:0},
    {q:"Which of the following would be the best title for the passage?",opts:["Causes of floods","Effects of floods","Types of floods","Prevention of floods"],ans:0},
    {q:"All of the following are natural disasters EXCEPT?",opts:["Floods","Tsunami","Earthquake","Airplane crash"],ans:3},
  ]
},
{
  id:4, title:"Baseball is sometimes called...",
  passage:`Baseball is sometimes called a national pastime in America. It has been played for many years in countries of South America and is very popular in Japan. Since baseball is an Olympic sport, more and more countries are putting together teams and joining the game.\n\nModern baseball began about 150 years ago in New York, USA. Baseball is played with a bat about 100 cm long made of metal or wood, and a small hard ball. Each player also wears one heavy leather glove.\n\nBaseball is played on a special outdoor field with an infield and outfield. In the infield is an area shaped like a diamond with three bases. The game of baseball is divided into nine innings. The team that scores the most runs by the end of the ninth inning wins.`,
  questions:[
    {q:"The writer says that baseball:",opts:["It is played only in America","It is not popular in Japan","It started in South America","It is becoming more popular all over the world"],ans:3},
    {q:"According to the text, baseball is played in more and more countries because:",opts:["It is an exciting game","It is included in the Olympic Games","Many American people live there","It is easy to play"],ans:1},
    {q:"Which sentence isn't true about baseball?",opts:["It was first played during the 1850s","It is an Olympic sport","The rules have changed quite a lot over the years","It started in New York"],ans:2},
    {q:"Which piece of equipment is not mentioned in the text?",opts:["Bat","Ball","Glove","Mask"],ans:3},
    {q:"What is the baseball field like?",opts:["It has an infield, outfield, and middle field","There are three diamonds on the ground","There are three bases on the diamond","It is usually in an indoor stadium"],ans:2},
    {q:"The game is divided into:",opts:["Two halves","Nine innings","Three bases","An infield and outfield"],ans:1},
    {q:"The object of the game is to:",opts:["Catch as many balls as you can","Hit the ball the farthest","Score the most runs","Bat as often as you can"],ans:2},
    {q:"What is true about a baseball match?",opts:["It's slow","It often takes place on hot summer days","Spectators cannot bring food","The speed of the match may change suddenly"],ans:3},
    {q:"According to the text, most American people have:",opts:["Childhood memory at a ballpark","Baseball gear","Experience of a baseball inning","All of them"],ans:0},
  ]
},
{
  id:5, title:"Brenda Ann Spencer",
  passage:`Brenda Ann Spencer grew up opposite the Cleveland Elementary School in a broken, disadvantaged family. Her father drank quite a lot of alcohol. Doctors had suggested that Brenda should be hospitalized, but instead her father gave her a gun as a Christmas present. She shot at students and school employees. When asked why she did it, she said: "I don't like Mondays." Two people were killed.`,
  questions:[
    {q:"Main idea of the passage:",opts:["A story about a school shooting and the reasons behind","The shooting accident","Opposite the Cleveland Elementary School","The suggestion that Brenda should be hospitalized"],ans:0},
    {q:"Where did Brenda Ann Spencer live?",opts:["Near the Cleveland High School","Opposite the Cleveland Elementary School","Across from the Cleveland Library","Beside the Cleveland Community Center"],ans:1},
    {q:"Which statement describes Brenda's background?",opts:["She grew up in a broken disadvantaged family","She came from a highly educated family","She was raised in a stable supportive family","She grew up in a wealthy privileged family"],ans:0},
    {q:"What did Brenda's father do when doctors suggested she be hospitalized?",opts:["He enrolled her in sports","He took her on vacation","He gave her a gun as a present for Christmas","He bought her a bicycle"],ans:2},
    {q:"How many people were killed by Brenda?",opts:["2","3","4","5"],ans:0},
    {q:"Introverted =",opts:["Outspoken","Neutral","Reserved","Aggressive"],ans:2},
    {q:"According to Spencer, why did she shoot the students?",opts:["She grew up in a broken family","Her father gave her a gun","She detested Mondays","Her father drank alcohol"],ans:2},
    {q:"It can be inferred from paragraph 2 that:",opts:["Brenda's father was a teetotaler","Brenda's father avoided alcohol","Brenda's father preferred coffee","Brenda's father drank quite a lot of alcohol"],ans:3},
  ]
},
{
  id:7, title:"A pancake is a flat cake",
  passage:`A pancake is a flat cake, often thin and round, prepared from a starch-based batter that may contain eggs, milk and butter and cooked on a hot surface. Archaeological evidence suggests that pancakes were probably eaten in prehistoric societies.\n\nIn the United Kingdom, pancakes are often unleavened and resemble a crêpe. In North America, a leavening agent is used creating a thick fluffy pancake. The Ancient Greeks made pancakes called tagenias, made with wheat flour, olive oil, honey, and curdled milk, served for breakfast.`,
  questions:[
    {q:"What is the main ingredient that gives pancakes their structure?",opts:["Starch-based batter","Lemon","Chocolate","Honey"],ans:0},
    {q:"Pancake day relates to:",opts:["Crimes","Pancake","Pancake Bell","Lent"],ans:3},
    {q:"In which paragraph does the author describe pancake varieties?",opts:["Paragraph 1","Paragraph 2","Paragraph 3","Paragraph 4"],ans:1},
    {q:"What type of pancake does North America use a leavening agent for?",opts:["Thin crêpe","Thick fluffy","Chocolate","Savoury"],ans:1},
  ]
},
{
  id:8, title:"Many people enjoy a cup of coffee",
  passage:`Coffee trees are native to eastern Africa and areas of the Arabian Peninsula. Coffee was first grown and traded in the 15th century. Most coffee came from Yemen. By the 17th century coffee had been introduced to Europe. The Dutch brought coffee to Indonesia. By the 20th century, most of the world's production came from Central and South America. Today, Brazil is the largest producer of coffee in the world.\n\nThe two most important kinds of coffee plants are arabica and robusta. Arabica makes up around 70% of the world's production. Robusta has more caffeine than arabica and is grown in Central and Western Africa. Robusta is less costly to grow because it is more resistant to diseases.`,
  questions:[
    {q:"In which paragraph does the author mention the height of the coffee plant?",opts:["Para 2","Para 3","Para 4","Para 5"],ans:1},
    {q:"What is the main idea of paragraph 4?",opts:["All types produce similar coffee","A comparison between some main type of coffee plants","Expensive to grow disease-prone plants","The story of coffee"],ans:1},
    {q:"The word 'traders' in para 2 closest to:",opts:["Buyers","Dealers","Farmers","Growers"],ans:1},
    {q:"The word 'it' in para 1 refers to:",opts:["Coffee","The story","Brazil","Dealers"],ans:0},
    {q:"It can be inferred from para 4 that:",opts:["Arabian Peninsula","It is expensive to grow coffee plants easy to be attacked by diseases","Same type produces similar taste","A comparison between types"],ans:1},
    {q:"Where do coffee trees originally come from?",opts:["Brazil","Arabian Peninsula","Indonesia","Europe"],ans:1},
    {q:"Which country makes the most coffee in the world?",opts:["Colombia","Vietnam","Ethiopia","Brazil"],ans:3},
    {q:"Which part of the coffee plant is used for the production of coffee drink?",opts:["The coffee bean","The leaf","The root","The flower"],ans:0},
    {q:"What would be the best title?",opts:["The story of coffee","Arabian Peninsula","Types of coffee plants","The coffee bean"],ans:0},
    {q:"All of the following is TRUE, EXCEPT:",opts:["Coffee trees of the same type produce coffee similar in taste and smell","Types differ in caffeine content","Robusta is more disease resistant","Different origins affect taste"],ans:0},
  ]
},
{
  id:11, title:"Many people would like to learn a musical instrument",
  passage:`Many people would like to learn how to play a musical instrument, but they are put off by one big problem: what to play?\n\nThink about your long-term future as a musician. If you want to play with other people, what sort of instrument would be most practical? The initial attraction of playing a dazzling solo instrument like trumpet, violin, flute or lead guitar might fade when you realise how many others compete with the same instrument!\n\nMany people live in flats and practising the drums, for example, will drive neighbours crazy. Electric versions of instruments give you the option of playing into the night using headphones.\n\nThis is quite a big factor. Many instruments can be purchased in different price ranges. Talk to people who already play instruments and find an experienced music teacher.`,

  id:12, title:"The Olympic Games — The Decathlon",
  passage:`The Olympic Games have changed a lot since their origins in Ancient Greece. Today, athletes from countries all over the world take part. In the ancient Games, a great champion might have received as much as a year's pay for winning a race.\n\nIn the ancient Olympics, athletes competed in the pentathlon, which consisted of the long jump, the discus, the javelin, a running race and wrestling. The Stockholm Olympics of 1912 brought back this tradition. The modern decathlon (ten events) was included, with the heptathlon (seven events) for women introduced later.\n\nAmerican decathlete Bruce Thorpe says: "The way it works is you complete each event and get points. At the end of two days, the person with the most points is champion and takes the gold medal."`,

{
  id:13, title:"All mammals feed their young",
  passage:`All mammals feed their young. Beluga whale mothers nurse their calves for some twenty months. The behavior of feeding of the young is built into the reproductive system. It is a nonselective part of parental care and the defining feature of a mammal.\n\nBut not all animal parents feed their young. Most egg-guarding fish do not for the simple reason that their young are so much smaller than the parents. In reptiles, the crocodile mother protects her young after they have hatched and takes them down to the water, but she does not actually feed them.\n\nFor animals other than mammals, feeding is not intrinsic to parental care. The most vulnerable moment in any animal's life is when it first finds itself completely on its own. Feeding postpones that moment until a young animal has grown to such a size that it is better able to cope.`,

{
  id:15, title:"During the seventeenth and eighteenth centuries",
  passage:`During the seventeenth and eighteenth centuries, almost nothing was written about the contribution of women during the colonial period. Lacking the right to vote and absent from the seats of power, women were not considered an important force in history. Anne Bradstreet wrote significant poetry, Mercy Otis Warren produced a history of the American Revolution, and Abigail Adams penned important letters. But little or no notice was taken.\n\nThroughout the nineteenth century, this lack of visibility continued. Writers were amateur historians whose writings were celebratory in nature and uncritical in their selection and use of sources.\n\nDespite gathering more information about ordinary women, most writing conformed to the 'great women' theory of history. Female authors singled out women leaders and wrote biographies. Most of these leaders were involved in public life as reformers, activists, or authors, and were not representative of ordinary women.`,

{
  id:16, title:"Babies' speech",
  passage:`Long before they can actually speak, babies pay special attention to the speech they hear around them. Within the first month of their lives, babies' responses to the sound of the human voice are different from their responses to other kinds of auditory stimuli. They will stop crying when they hear a person talking, but not when they hear a bell or the sound of a rattle.\n\nBy the time they are six or seven weeks old, babies can detect the difference between syllables pronounced with rising and falling intonations. Long before they develop actual language comprehension, babies can sense when an adult is playful or angry.\n\nAdults make it as easy as they can for babies to learn a language by exaggerating such cues. One researcher observed babies and their mothers in six different cultures and found that, in all six languages, the mothers used simplified syntax, short utterances, and even nonsense sounds.`,

{
  id:17, title:"Esperanto is what is called a planned language",
  passage:`Esperanto is a planned, or artificial, language. It was created by Polish eye doctor Ludwik Lazar Zamenhof. Zamenhof believed that a common language would help to alleviate some of the misunderstandings among cultures.\n\nIn Zamenhof's first attempt, he tried to create a language that was as uncomplicated as possible. He then tried a different way: making words sound like words people already knew but simplifying the grammar. All nouns end in -o (e.g. amiko = friend), all adjectives end in -a (e.g. bela = pretty). The prefix mal- makes a word opposite: malamiko = enemy.\n\nIn 1887, Zamenhof published a description using the pen name Dr. Esperanto, which means "a person who hopes." The First World Congress of Esperanto took place in 1905 in France, with 700 attendees from 20 countries. Today, it is estimated that perhaps a quarter of a million people are fluent in it.`,

{
  id:19, title:"Taken together, income, occupation...",
  passage:`Taken together, income, occupation, and education are good measures of people's social standing. Using a layered model of stratification, most sociologists describe the class system in the United States as: upper, upper middle, middle, lower middle, and lower class. The different classes are arranged along a continuum with those with the most money, education, and prestige at the top and those with the least at the bottom.\n\nIn the United States, the upper class owns the major share of corporate and personal wealth. They are the most powerful group and influence the economy and politics of the country. The upper class is primarily characterized by inherited wealth passed down across multiple generations.\n\nThe term "old money" is used to refer to a particular group of rich people whose families have been wealthy for generations, as opposed to those who are newly rich.\n\nThe upper-middle class consists of highly educated professionals such as doctors, lawyers, and corporate executives who earn high incomes but do not own major shares of corporate wealth.\n\nThe middle class is the most difficult to define because people in this class vary widely in lifestyle and resources. They may include small business owners, teachers, and skilled workers.\n\nThe lower-middle class consists largely of unskilled workers in manual labor. Quite a few of them think that they don't belong to this class and many actively seek upward mobility.\n\nThe lower class includes both the working poor and the underclass. Some people in the lower class don't have any jobs so they may earn their living by committing crimes. A subcategory — the underclass — has been added to the lower class to describe those in persistent poverty.\n\nDespite social myths to the contrary, the best predictor of future wealth is the family in which you are born. The connection between family background and future success remains tenuous for those outside the upper classes, meaning the link is weak for most Americans.`,

{
  id:20, title:"Although America's immigration...",
  passage:`Although America's immigration policy now seems dominated by a desire to seal the country's southern border, Donald Trump's administration has been surprisingly tolerant of a certain type of crossing. Those by legal, temporary migrants or guest workers in search of low-wage work have risen dramatically over the past decade. The government granted 408,000 visas for guest workers in 2019, up from 103,000 in 2010. This growth began well before the start of Donald Trump's term, but has recently come back into focus.\n\nThe H-2A visa for agricultural workers has no annual cap, and the number has soared. The H-2B visa for non-agricultural seasonal workers—in hospitality, landscaping, seafood processing and similar industries—does have a cap: Congress sets a maximum of 66,000 per year, though the administration has repeatedly raised it through supplemental allocations.\n\nEmployers favour guest workers because they are cheaper to hire. They receive lower wages than American workers, are not entitled to the same benefits, and employers do not have to pay for their transport or housing. Labour advocates have lambasted the guest-worker programme, arguing that it creates a system ripe for exploitation, since workers are tied to their employer and cannot easily change jobs if mistreated.\n\nThe farm-labour reform bill, if passed, could also allow agricultural workers to earn higher wages, receive better benefits, and have more vacation time. However, it would not guarantee permanent employment for agricultural workers.`,

{
  id:21, title:"The Olympic Games — Decathlon (VSTEP B1-C1)",
  passage:`The Olympic Games have changed a lot since their origins in Ancient Greece. Today, athletes from countries all over the world take part and the Olympics are big business, watched by millions on television. Some things have stayed the same: athletes could make a lot of money from winning. In the ancient Games, a great champion might have received as much as a year's pay for winning a race.\n\nIn the ancient Olympics, athletes competed in the pentathlon: the long jump, the discus, the javelin, a running race and wrestling. The first winner, in 708 BC, was Lampis of Sparta. The Stockholm Olympics of 1912 brought back this tradition. The modern decathlon (ten events) was included, with the heptathlon (seven events) for women introduced later.\n\nBruce Thorpe says: "The way it works is you complete each event and get points. At the end of two days, the person with the most points is champion. We start with the 100 metres, the long jump, the shot put, the high jump and the 400 metres. The second day, it's the 110 metre hurdles, the discus, the javelin, the pole vault and the 1500 metres — the one we all dread."`,

{
  id:26, title:"Bangkok — Travel in Bangkok",
  passage:`Bangkok might be noisy and polluted but it's also an exciting city with plenty of things to see and do. The Khao San Road was a famous traveler spot but for something more authentic, Phra Kanong offers an alternative place to stay, with its fantastic street markets. It's not as convenient for the main tourist sites, but it has a Skytrain station so you can be at the Grand Palace in 20 minutes.\n\nBangkok's traffic can be a nightmare. To explore the temples and historical sites, catch an express boat river taxi along the Chao Phraya River and the canals. For the modern part of the city, the Skytrain is a fast, cheap way to travel.\n\nThai street food is among the best in the world, and for around $5 you can eat a filling and delicious meal. Head for Chinatown — Yaowarat Street — and choose from many excellent Chinese and Thai restaurants.`,

{
  id:28, title:"As health care costs rise — Acupuncture",
  passage:`As health care costs continually rise in most developed countries, many people are looking to alternative forms of health therapy. Two of the most popular are acupuncture and herbal medicine, both of which have been used for centuries in Asia and are rooted in ancient Chinese medicine.\n\nAcupuncture is based on ancient Chinese medicine and the importance of ki, a kind of life force that pulsates through every human's body. At times, these pathways might suffer blockage so ki is unable to flow smoothly through the body. Acupuncturists locate and stimulate certain areas on the surface of the body to relieve pressure and allow ki to flow freely.\n\nEar acupuncture is described as one of the most common and successful methods. The ear contains a strong, healthy flow of blood as well as numerous nerve points that connect it with the rest of the body.\n\nHerbal therapy involves special herbs prescribed to be taken in a hot liquid form, usually tea. Herbs boost the immune system and can aid in normalizing blood pressure.`,

{
  id:29, title:"There are two basic types of glaciers",
  passage:`There are two basic types of glaciers: those that flow outward in all directions with little regard for underlying terrain (ice sheets and ice caps), and those that are confined by terrain to a particular path (mountain or alpine glaciers).\n\nThere must be over 50,000 square kilometres of land covered with ice for the glacier to qualify as an ice sheet. Now there are only two ice sheets left on Earth, covering Greenland and Antarctica.\n\nAny domelike body of ice that also flows out in all directions but covers less than 50,000 square kilometres is called an ice cap. Mountain glaciers are typically identified by the landform that controls their flow. The most common types of mountain glaciers are the cirque and valley glaciers. Cirque glaciers are found in depressions in the surface of the land.`,

{
  id:30, title:"American Jazz",
  passage:`American jazz is a mixture of sounds borrowed from American and African folk music, European classical music, and Christian gospel songs. One of the recognizable characteristics of jazz is its use of improvisation: certain parts are written out and played the same way, while improvised parts are created spontaneously during a performance.\n\nThe earliest form of jazz was ragtime, lively songs performed on the piano. The best-known of the ragtime performers was Scott Joplin. Born in 1868 to former slaves, Joplin earned his living from a very early age playing the piano in bars along the Mississippi. One of his regular jobs was at the Maple Leaf Club in Sedalia, Missouri, where he began writing over 500 compositions, the most famous being "The Maple Leaf Rag."`,

{
  id:31, title:"Millions of people are using cellphones today",
  passage:`Millions of people are using cellphones today. In many countries, cellphones are very popular with young people. They find that the phones are more than a means of communication — having a mobile phone shows that they are cool and connected.\n\nSome doctors are concerned that in the future many people may suffer health problems from the use of mobile phones. Medical studies have shown changes in the brain cells of some people who use mobile phones. In one case, a travelling salesman had to retire at a young age because of serious memory loss. He used to talk on his mobile phone for about six hours a day.\n\nWhat makes mobile phones potentially harmful? The answer is radiation. Mobile phone companies agree that there is some radiation, but say the amount is too small to worry about.\n\nAs the discussion about their safety continues, it appears that it's best to use mobile phones less often.`,

{
  id:32, title:"Reality television",
  passage:`Reality television is a genre of television programming which, it is claimed, presents unscripted dramatic or humorous situations, documents actual events and features ordinary people rather than professional actors. It could be described as a form of artificial or "heightened" documentary. Although the genre has existed since the early years of television, the current explosion of popularity dates from around 2000.\n\nCritics say that the term "reality television" is somewhat of a misnomer and that such shows frequently portray a modified form of reality, with participants put in exotic locations or abnormal situations, sometimes coached to act in certain ways.\n\nPart of reality television's appeal is due to its ability to place ordinary people in extraordinary situations. Reality television also has the potential to turn its participants into national celebrities.\n\nMark Burnett, creator of Survivor, has said: "I tell good stories. It really is not reality TV. It really is unscripted drama."`,

{
  id:33, title:"The development of jazz",
  passage:`The development of jazz can be seen as part of the larger continuum of American popular music, especially dance music. In the twenties, jazz became the hottest new thing in dance music, much as ragtime had at the turn of the century.\n\nTwo characteristics distinguish jazz from other dance music. The first is improvisation, the changing of a musical phrase according to the player's inspiration. Jazz musicians strive for an individual style, and the improvise or paraphrase is a jazz musician's main opportunity to display individuality.\n\nThe second distinguishing characteristic of jazz is a rhythmic drive that was initially called "hot" and later "swing". In playing hot, a musician consciously departs from strict meter to create a relaxed sense of phrasing that also emphasizes the underlying rhythms.`,

{
  id:35, title:"There are many theories about drama",
  passage:`There are many theories about the beginning of drama in ancient Greece. The one most widely accepted today is based on the assumption that drama evolved from ritual. Those measures which appeared to bring the desired results were retained and repeated until they hardened into fixed rituals. Eventually stories arose which explained the mysteries of the rites. As time passed, some rituals were abandoned, but the stories, later called myths, persisted and provided material for art and drama.\n\nThose who believe that drama evolved out of ritual also argue that those rites contained the seed of theater because music, dance, masks, and costumes were almost always used. Performers often impersonated other people, animals, or supernatural beings.\n\nAnother theory traces the theater's origin from the human interest in storytelling. According to this view, tales are gradually elaborated, first through the use of impersonation, action, and dialogue by a narrator and then through the assumption of each role by a different person.`,

{
  id:36, title:"Birds that feed in flocks",
  passage:`Birds that feed in flocks commonly retire together into roosts. In winter, it is important for birds to keep warm at night and conserve precious food reserves. Solitary roosters shelter in dense vegetation or enter a cavity, but the effect of sheltering is magnified by several birds huddling together. Body contact reduces the surface area exposed to the cold air. Two kinglets huddling together were found to reduce their heat losses by a quarter, and three together saved a third of their heat.\n\nThe second possible benefit of communal roosts is that they act as "information centers". When birds return in the evening, those that did not feed well appear to follow those that did the next morning.\n\nFinally, there is safety in numbers at communal roosts since there will always be a few birds awake at any given moment to give the alarm. But this increased protection is partially counteracted by the fact that mass roosts attract predators.`,

{
  id:38, title:"Basic to any understanding of Canada",
  passage:`Basic to any understanding of Canada in the 20 years after the Second World War is the country's impressive population growth. For every three Canadians in 1945, there were over five in 1966. Most of this surging growth came from natural increase. The baby boom continued through the decade of the 1950s, producing a population increase of nearly fifteen percent in the five years from 1951 to 1956. In 1957 the Canadian birth rate stood at 28 per thousand, one of the highest in the world.\n\nAfter the peak year of 1957, the birth rate in Canada began to decline. Partly this decline reflected the low level of births during the depression and the war, but it was also caused by changes in Canadian society. Young people were staying at school longer; more women were working; young married couples were buying automobiles or houses before starting families.`,

{
  id:39, title:"Most people can remember a phone number",
  passage:`Most people can remember a phone number for up to thirty seconds. Information that makes its way to the short term memory (STM) does so via the sensory storage area. The most accepted theory comes from George A. Miller, who suggested that humans can remember approximately seven chunks of information. A chunk is defined as a meaningful unit of information, such as a word or name.\n\nWhen making a conscious effort to memorize something, many people engage in "rote rehearsal". By repeating something over and over again, one is able to keep a memory alive. Unfortunately, this type of memory maintenance only succeeds if there are no interruptions.\n\nA better way is to practice "elaborate rehearsal". This involves assigning semantic meaning to a piece of information so that it can be filed along with other pre-existing long term memories. Encoding information semantically also makes it more retrievable.`,

{
  id:41, title:"Before the mid-nineteenth century — Food preservation",
  passage:`Before the mid-nineteenth century, people in the United States ate most foods only in season. In 1810, a French inventor named Nicolas Appert developed the cooking-and-sealing process of canning. In the 1850s, Gail Borden developed a means of condensing and preserving milk. By 1880, inventors had fashioned stamping and soldering machines that mass-produced cans from tinplate. Suddenly all kinds of food could be preserved and bought at all times of the year.\n\nRailroad refrigerator cars enabled growers and meat packers to ship perishables great distances. By the 1890's, northern city dwellers could enjoy southern and western strawberries, grapes, and tomatoes for up to six months of the year. As easy means of producing ice commercially had been invented in the 1870's, by 1900 the nation had more than two thousand commercial ice plants. The icebox was replaced by the mechanized refrigerator in the 1920's and 1930's.`,

{
  id:43, title:"It is estimated that over 99% of all species",
  passage:`It is estimated that over 99 percent of all species that have existed have become extinct. When a species is no longer adapted to a changed environment, it may perish. Rapid ecological change may render an environment hostile to a species. Food resources may be affected by environmental changes, which will then cause problems for a species requiring these resources.\n\nThe fossil record reveals that extinction has occurred throughout the history of Earth. One of the best-known examples of mass extinction occurred 65 million years ago with the demise of dinosaurs. Perhaps the largest mass extinction was the one that occurred 225 million years ago, when approximately 95 percent of all species died.\n\nOne interesting finding is that extinctions during the past 250 million years have tended to be more intensive every 26 million years. This periodic extinction might be due to the intersection of the Earth's orbit with a cloud of comets, but this theory is purely speculative.`,

{
  id:44, title:"Many folk cures",
  passage:`Many folk cures which have been around for centuries may be more therapeutic than previously suspected. Alexander Fleming did not just randomly choose cheese molds to study when he discovered penicillin. Moldy cheese was frequently given to patients as a remedy for illness.\n\nIn parts of South America, a powder obtained from grinding sugar cane is used for healing infections. Ordinary sugar in high concentrations is lethal to bacteria. Its suction effect eliminates dead cells and generates a glass-like layer which protects the wound.\n\nAnother example is Arab fishermen who rub their wounds with a venomous catfish to quicken healing. This catfish excretes a gel-like slime which scientists found to contain antibiotics, coagulant that helps close injured blood vessels, and anti-inflammatory agents.`,

let progress=JSON.parse(localStorage.getItem('b1quiz_v2')||'{}');
let currentExam=null,currentQs=[],currentIdx=0,answers=[],reviewMode=false;

function shuffle(arr){let a=[...arr];for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildHome(){
  let totalQ=EXAMS.reduce((s,e)=>s+e.questions.length,0);
  document.getElementById('totalExams').textContent=EXAMS.length;
  document.getElementById('totalQs').textContent=totalQ;
  let doneArr=Object.values(progress).filter(p=>p.done);
  document.getElementById('doneExams').textContent=doneArr.length;
  let scores=doneArr.map(p=>p.score);
  document.getElementById('avgScore').textContent=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length)+'%':'—';
  renderGrid(EXAMS);
}

function renderGrid(exams){
  const g=document.getElementById('examGrid');
  g.innerHTML=exams.map(e=>{
    const p=progress[e.id]||{};
    let sb='';
    if(p.done&&p.score!==undefined){
      let cls=p.score>=80?'high':p.score>=60?'mid':'low';
      sb=`<span class="score-badge ${cls}">${p.score}%</span>`;
    }
    return `<div class="exam-card ${p.done?'done':''}" onclick="startExam(${e.id})">
      <div class="exam-num">ĐỀ ${e.id}</div>
      <div class="exam-title">${e.title}</div>
      <div class="exam-meta">
        <span class="badge ${p.done?'done':''}">${e.questions.length} câu</span>
        ${sb}
      </div>
    </div>`;
  }).join('');
}

function filterExams(){
  let q=document.getElementById('searchInput').value.toLowerCase();
  renderGrid(EXAMS.filter(e=>e.title.toLowerCase().includes(q)||('đề '+e.id).includes(q)));
}

function startRandom(){
  const overlay=document.getElementById('spinnerOverlay');
  const spinNum=document.getElementById('spinNum');
  const spinTitle=document.getElementById('spinTitle');
  overlay.classList.add('show');
  let count=0, total=25;
  let chosen=EXAMS[Math.floor(Math.random()*EXAMS.length)];
  let interval=setInterval(()=>{
    let fake=EXAMS[Math.floor(Math.random()*EXAMS.length)];
    spinNum.textContent='ĐỀ '+fake.id;
    spinTitle.textContent=fake.title;
    count++;
    if(count>total){
      clearInterval(interval);
      spinNum.textContent='ĐỀ '+chosen.id;
      spinNum.style.color='#ef4444';
      spinTitle.textContent=chosen.title;
      setTimeout(()=>{
        overlay.classList.remove('show');
        spinNum.style.color='#6366f1';
        startExam(chosen.id);
      },900);
    }
  },80);
}

function startExam(id,review=false){
  currentExam=EXAMS.find(e=>e.id===id);
  reviewMode=review;
  let qs=currentExam.questions.map(q=>{
    let opts=[...q.opts];
    let correct=opts[q.ans];
    if(!review) opts=shuffle(opts);
    return{...q,opts,ans:opts.indexOf(correct)};
  });
  currentQs=review?qs:shuffle(qs);
  currentIdx=0;
  answers=new Array(currentQs.length).fill(null);
  document.getElementById('homeScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('quizTitleBar').textContent=`ĐỀ ${currentExam.id}: ${currentExam.title}`;
  renderQ();
}

function renderQ(){
  const q=currentQs[currentIdx];
  const total=currentQs.length;
  document.getElementById('progressBar').style.width=((currentIdx/total)*100)+'%';
  document.getElementById('qCounter').textContent=`Câu ${currentIdx+1} / ${total} — ${Math.round(currentIdx/total*100)}% hoàn thành`;

  let passHTML='';
  if(currentExam.passage){
    passHTML=`<div>
      <span class="passage-toggle" id="passToggle" onclick="togglePassage()">📄 Ẩn đoạn văn</span>
      <div id="passageBox" class="passage-box">${currentExam.passage.replace(/\n/g,'<br>')}</div>
    </div>`;
  }
  document.getElementById('passageArea').innerHTML=passHTML;

  const userAns=answers[currentIdx];
  const labels=['A','B','C','D'];
  let optsHTML=q.opts.map((opt,i)=>{
    let cls='opt-btn';
    if(userAns!==null){
      if(i===q.ans) cls+=' correct';
      else if(i===userAns) cls+=' wrong';
    }
    if(reviewMode&&i===q.ans) cls='opt-btn reveal';
    return `<button class="${cls}" onclick="selectOpt(${i})" ${userAns!==null||reviewMode?'disabled':''}>
      <span class="opt-label">${labels[i]}</span>${opt}
    </button>`;
  }).join('');

  let resultHTML='';
  if(userAns!==null&&!reviewMode){
    if(userAns===q.ans){
      resultHTML=`<div class="result-row ok"><span class="result-icon">✅</span> Chính xác! Rất tốt!</div>`;
    } else {
      resultHTML=`<div class="result-row err"><span class="result-icon">❌</span> Sai rồi! Đáp án đúng: <strong>${labels[q.ans]}. ${q.opts[q.ans]}</strong></div>`;
    }
  }

  document.getElementById('questionArea').innerHTML=`
    <div class="question-card">
      <div class="q-text">${currentIdx+1}. ${q.q}</div>
      <div class="options">${optsHTML}</div>
      ${resultHTML}
    </div>`;

  document.getElementById('prevBtn').style.visibility=currentIdx>0?'visible':'hidden';
  const nb=document.getElementById('nextBtn');
  if(currentIdx===currentQs.length-1&&!reviewMode){
    nb.textContent='Nộp bài ✓';nb.onclick=finishExam;
  } else {
    nb.textContent=currentIdx===currentQs.length-1?'Hoàn thành ✓':'Câu tiếp →';
    nb.onclick=nextQ;
  }
}

function togglePassage(){
  const b=document.getElementById('passageBox');
  const t=document.getElementById('passToggle');
  if(b.style.display==='none'){b.style.display='block';t.textContent='📄 Ẩn đoạn văn';}
  else{b.style.display='none';t.textContent='📄 Hiện đoạn văn';}
}
function selectOpt(i){if(answers[currentIdx]!==null||reviewMode)return;answers[currentIdx]=i;renderQ();}
function nextQ(){if(currentIdx<currentQs.length-1){currentIdx++;renderQ();}else if(reviewMode)goHome();}
function prevQ(){if(currentIdx>0){currentIdx--;renderQ();}}

function finishExam(){
  let correct=0;
  answers.forEach((a,i)=>{if(a===currentQs[i].ans)correct++;});
  let total=currentQs.length;
  let score=Math.round(correct/total*100);
  progress[currentExam.id]={done:true,score,correct,total};
  localStorage.setItem('b1quiz_v2',JSON.stringify(progress));
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  document.getElementById('resScore').textContent=score+'%';
  document.getElementById('resTotal').textContent=`${correct}/${total} câu đúng`;
  let msg,sub,color;
  if(score>=90){msg='🎉 Xuất sắc!';sub='Em đã nắm vững bài đọc này rồi!';color='#059669';}
  else if(score>=70){msg='👍 Khá tốt!';sub='Ôn luyện thêm để đạt điểm cao hơn nhé!';color='#d97706';}
  else if(score>=50){msg='📚 Cần cố gắng thêm';sub='Đọc lại bài và thử lại sẽ tốt hơn!';color='#6366f1';}
  else{msg='💪 Cố lên nào!';sub='Xem đáp án để hiểu bài rồi làm lại nhé!';color='#ef4444';}
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('resSub').textContent=sub;
  document.querySelector('.result-circle').style.borderColor=color;
  document.querySelector('.big-num').style.color=color;
}

function retryExam(){startExam(currentExam.id);}
function reviewExam(){startExam(currentExam.id,true);}
function goHome(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('homeScreen').style.display='block';
  buildHome();
}

buildHome();
</script>
